name: Build macOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Manuell auslösbar per Knopfdruck auf GitHub

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: App bauen
        run: pyinstaller main.spec

      - name: Fertige .app als ZIP verpacken
        run: |
          cd dist
          zip -r ../MeinSpiel-Mac.zip EInf-Lighthouse-game.app

      - name: Download-Link bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: MeinSpiel-Mac
          path: MeinSpiel-Mac.zip
          retention-days: 30